<!DOCTYPE html>
<html>
<head>
<title>Sqft Calculator</title>
<style>
body{
font-family: Arial;
padding:20px;
background:#f2f2f2;
}
table{
width:100%;
background:white;
border-collapse:collapse;
}
th,td{
border:1px solid #ccc;
padding:8px;
text-align:center;
}
input{
width:80px;
padding:5px;
}
button{
padding:10px;
margin-top:10px;
}
</style>
</head>

<body>

<h2>Marble Sqft Calculator</h2>

<table id="table">
<tr>
<th>Sr</th>
<th>Length (inch)</th>
<th>Width (inch)</th>
<th>Sqft</th>
</tr>

<tr>
<td>1</td>
<td><input type="number" oninput="calc(this)"></td>
<td><input type="number" oninput="calc(this)"></td>
<td class="sqft">0</td>
</tr>

</table>

<button onclick="addRow()">Add Row</button>

<h3>Total Sqft: <span id="total">0</span></h3>

<script>

function calc(el){

let row = el.parentElement.parentElement

let length = parseFloat(row.children[1].children[0].value) || 0
let width = parseFloat(row.children[2].children[0].value) || 0

let sqft = (length * width) / 144

row.children[3].innerText = sqft.toFixed(2)

total()

}

function total(){

let total = 0

document.querySelectorAll(".sqft").forEach(e=>{
total += parseFloat(e.innerText) || 0
})

document.getElementById("total").innerText = total.toFixed(2)

}

function addRow(){

let table = document.getElementById("table")

let rows = table.rows.length

let row = table.insertRow()

row.innerHTML =
`<td>${rows}</td>
<td><input type="number" oninput="calc(this)"></td>
<td><input type="number" oninput="calc(this)"></td>
<td class="sqft">0</td>`

}

</script>

</body>
</html>
